# Intelligent Story Generator - Application Configuration
spring.application.name=intelligent-story-generator
server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Static Resources
spring.web.resources.static-locations=classpath:/static/

# Logging
logging.level.com.storygenerator=DEBUG

# OpenAI Integration (Optional)
# Set your API key below to enable AI-powered story generation.
# If left as YOUR_API_KEY or empty, the app uses built-in story templates.
openai.api.key=YOUR_API_KEY
openai.model=gpt-3.5-turbo
openai.api.url=https://api.openai.com/v1/chat/completions
